<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 310" width="860" height="310">
<defs>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&amp;family=DM+Mono:wght@400;500&amp;display=swap');

.bg { fill: #0f1f38; }

.curve-fill {
  stroke: none;
  opacity: 0.12;
  transition: opacity 0.4s;
}
.curve-stroke {
  fill: none;
  stroke-width: 2;
  opacity: 0.3;
}

/* Prior — powder blue */
.prior-fill   { fill: #a8c4d8; }
.prior-stroke { stroke: #a8c4d8; }

/* Likelihood — terracotta */
.lik-fill   { fill: #c94f2a; }
.lik-stroke { stroke: #c94f2a; }

/* Posterior — cream/gold */
.post-fill   { fill: #f5f0e8; }
.post-stroke { stroke: #f5f0e8; }

/* Highlight glow stroke — white outline + colored stroke */
.glow-stroke {
  fill: none;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
  opacity: 0;
}

/* Baseline */
.baseline {
  stroke: #d4cfc4;
  stroke-width: 0.5;
  opacity: 0.2;
}

/* Labels */
.label-base {
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  opacity: 0.3;
}
.label-prior    { fill: #a8c4d8; }
.label-lik      { fill: #c94f2a; }
.label-post     { fill: #f5f0e8; }

.name {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 54px;
  font-weight: 400;
  fill: #f5f0e8;
  letter-spacing: -0.01em;
}
.name-em {
  font-style: italic;
  fill: #a8c4d8;
}
.tagline {
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  fill: #a8c4d8;
  opacity: 0.6;
}
.footer-text {
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  fill: #f5f0e8;
  opacity: 0.28;
}

/* ── ANIMATION ──────────────────────────────────────────────── */
/*
  Cycle: 9s total, 3s per curve
  prior:      0s–3s active
  likelihood: 3s–6s active
  posterior:  6s–9s active
  Each: ramp up 0.3s, hold, ramp down 0.3s
*/

/* Fill brightens when active */
@keyframes fill-prior {
  0%,  100%      { opacity: 0.12; }
  0%             { opacity: 0.12; }
  3.3%           { opacity: 0.22; }
  30%            { opacity: 0.22; }
  33.3%          { opacity: 0.12; }
}
@keyframes fill-lik {
  0%, 33.2%, 100% { opacity: 0.12; }
  36.6%           { opacity: 0.22; }
  63.2%           { opacity: 0.22; }
  66.6%           { opacity: 0.12; }
}
@keyframes fill-post {
  0%, 66.5%, 100% { opacity: 0.12; }
  69.9%           { opacity: 0.22; }
  96.5%           { opacity: 0.22; }
  99.9%           { opacity: 0.12; }
}

/* Stroke brightens */
@keyframes stroke-prior {
  0%,  100%      { opacity: 0.3; }
  3.3%           { opacity: 0.7; }
  30%            { opacity: 0.7; }
  33.3%          { opacity: 0.3; }
}
@keyframes stroke-lik {
  0%, 33.2%, 100% { opacity: 0.3; }
  36.6%           { opacity: 0.7; }
  63.2%           { opacity: 0.7; }
  66.6%           { opacity: 0.3; }
}
@keyframes stroke-post {
  0%, 66.5%, 100% { opacity: 0.3; }
  69.9%           { opacity: 0.7; }
  96.5%           { opacity: 0.7; }
  99.9%           { opacity: 0.3; }
}

/* Glow outline appears */
@keyframes glow-prior {
  0%,  100%      { opacity: 0; }
  3.3%           { opacity: 0.55; }
  30%            { opacity: 0.55; }
  33.3%          { opacity: 0; }
}
@keyframes glow-lik {
  0%, 33.2%, 100% { opacity: 0; }
  36.6%           { opacity: 0.55; }
  63.2%           { opacity: 0.55; }
  66.6%           { opacity: 0; }
}
@keyframes glow-post {
  0%, 66.5%, 100% { opacity: 0; }
  69.9%           { opacity: 0.55; }
  96.5%           { opacity: 0.55; }
  99.9%           { opacity: 0; }
}

/* Label brightens */
@keyframes label-prior {
  0%,  100%      { opacity: 0.3; }
  3.3%           { opacity: 1; }
  30%            { opacity: 1; }
  33.3%          { opacity: 0.3; }
}
@keyframes label-lik {
  0%, 33.2%, 100% { opacity: 0.3; }
  36.6%           { opacity: 1; }
  63.2%           { opacity: 1; }
  66.6%           { opacity: 0.3; }
}
@keyframes label-post {
  0%, 66.5%, 100% { opacity: 0.3; }
  69.9%           { opacity: 1; }
  96.5%           { opacity: 1; }
  99.9%           { opacity: 0.3; }
}

.anim-fill-prior   { animation: fill-prior   9s ease-in-out infinite; }
.anim-fill-lik     { animation: fill-lik     9s ease-in-out infinite; }
.anim-fill-post    { animation: fill-post    9s ease-in-out infinite; }

.anim-stroke-prior { animation: stroke-prior 9s ease-in-out infinite; }
.anim-stroke-lik   { animation: stroke-lik   9s ease-in-out infinite; }
.anim-stroke-post  { animation: stroke-post  9s ease-in-out infinite; }

.anim-glow-prior   { animation: glow-prior   9s ease-in-out infinite; }
.anim-glow-lik     { animation: glow-lik     9s ease-in-out infinite; }
.anim-glow-post    { animation: glow-post    9s ease-in-out infinite; }

.anim-label-prior  { animation: label-prior  9s ease-in-out infinite; }
.anim-label-lik    { animation: label-lik    9s ease-in-out infinite; }
.anim-label-post   { animation: label-post   9s ease-in-out infinite; }
</style>

<pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
  <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
</pattern>
</defs>

<!-- Background -->
<rect width="860" height="310" class="bg"/>
<rect width="860" height="310" fill="url(#grid)"/>

<!-- Name + tagline — left side, vertically centered in top zone -->
<text x="60" y="68" class="name">Kevin <tspan class="name-em">Linares</tspan></text>
<text x="62" y="94" class="tagline">Survey Methodologist · Data Scientist · R &amp; Quarto</text>

<!-- Hairline rule above chart -->
<line x1="60" y1="114" x2="800" y2="114" class="baseline"/>

